<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6b5a;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="800" height="480" fill="url(#bg)"/>
  <rect width="800" height="480" fill="url(#grid)"/>
  <circle cx="650" cy="80" r="160" fill="rgba(255,255,255,0.05)"/>
  <circle cx="100" cy="400" r="120" fill="rgba(255,255,255,0.04)"/>
  <text x="400" y="200" font-family="Georgia,serif" font-size="80" fill="rgba(255,255,255,0.15)" text-anchor="middle">🛰</text>
  <text x="400" y="290" font-family="Georgia,serif" font-size="28" font-weight="bold" fill="rgba(255,255,255,0.9)" text-anchor="middle">Remote Sensing</text>
  <rect x="340" y="310" width="120" height="3" fill="rgba(200,151,58,0.8)" rx="2"/>
</svg>
